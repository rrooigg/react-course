<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      const button = <button>Good job!</button> 
      const my_name = <p>My name is Nadifa</p> 
      const div = ( 
        <div>
          <p>Cotton socks</p>
          <p>Price: $10</p>
          <button>Add to Cart</button>
        </div>

      ); 
      
      const container = document.querySelector('.js-container');

      // console.log(productCost);

      //challenge exercises
      let productCost = 10 + (2*8);
      const shippingCost = 5;
      const total = productCost + shippingCost;

      const cost_div = (
        <div>
          <p>Product cost: $ {productCost}</p>
          <p>Shipping cost: $ {shippingCost}</p>
          <p>Total cost: $ {total}</p>
          <button>Place your order</button>
        </div>
      );
      const day = dayjs().format('MMMM D');
      const day_paragraph = <p>Today is {day}</p>
  
      // console.log(day); 

      const root = ReactDOM.createRoot(container);

      setInterval(() => { 
        const time_paragraph = <p>Current time: {dayjs().format('HH:mm:ss')}</p>
        root.render(time_paragraph); 
      }, 1000); 
    
    </script> 
  </body>
</html>
