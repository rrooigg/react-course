<!--State and Event Handlers for functionality-->
<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div> 

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput({chatMessages, setChatMessages}) {
        const [ inputText, setInputText ] = React.useState('');

        function saveInputText(event) {
          //gets the input inside the text box
          setInputText(event.target.value);

        } 

        function sendMessage() {
          //lifting the state up because updater () is in another component 
          const newChatMessages = [
            //need to create a copy of the data then modify the copy using spread operator ...
            ...chatMessages, {
              message: inputText,
              sender: 'user',
              id: crypto.randomUUID()
            }
          ];
          setChatMessages(newChatMessages);

          const response = Chatbot.getResponse(inputText);
          setChatMessages([
            //need to create a copy of the data then modify the copy using spread operator ...
            ...newChatMessages, {
              message: response,
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ]);
           
          setInputText(''); 
        }

        return (
          <>
            <input placeholder="Send a message to chatbot" size="30" onChange={ saveInputText } value={inputText}/>
            <button onClick={ sendMessage }>Send</button>
          </>
        ); 
      }
  
      function ChatMessage(props) {
        const { message, sender } = props;

        return (
          <div>
            {sender === 'robot' && <img src="images/robot.png" width="30"/>}
            {message}
            {sender === 'user' && <img src="images/user.png" width="30"/>}
          </div>
        );
      }

      function ChatMessages({chatMessages}) {

        // const chatMessages = array[0]; //read current state value
        // const setChatMessages = array[1]; //returns a function that'll update the state

        return (
          <>
            {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage 
                  message = {chatMessage.message}
                  sender = {chatMessage.sender}
                  key={chatMessage.id}
                />
              ); 
          })} 
        </>
      );
    }

      function App() {
        const [ chatMessages, setChatMessages ] = React.useState([{
          message: 'hello chatbot',
          sender: 'user',
          id: 'id1'
        }, {
          message: 'Hello! How can I help you?',
          sender: 'robot',
          id: 'id2'
        }, { 
          message: "What is today's date",
          sender: 'user',
          id: 'id3'
        }, {
          message: "Today is May 21",
          sender: "robot" ,
          id: 'id4'
        }]);

        return (
          <>
          <ChatInput 
          chatMessages={chatMessages}
          setChatMessages={setChatMessages}/> 
          <ChatMessages 
            chatMessages={chatMessages}/>
        </>
        );

      }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script> 
  </body>
</html>
