<!--Components and Props-->
<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div> 

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      //to create a components use functions, name must start with capital letter, returns html
      function ChatInput() {
        return (
          <>
            <input placeholder="Send a message to chatbot" size="30"/>
            <button>Send</button>
          </>
        ); 
      }
      //props is an object that contains all attributes given to the component
      function ChatMessage(props) { //or another shortcut is ({ message, sender })
        // const message = props.message;
        // const sender = props.sender;

        //shortcut/deconstructuring
        const { message, sender } = props;

        //another shortcut
        /*
        if (sender === 'robot') {
          return (
            <div>
              <img src="images/robot.png" width="30"/>
              {message}
            </div>
          );
        } 
        */

        return (
          <div>
            {/*can't use 'if' here directly so use &&*/}
            {sender === 'robot' && <img src="images/robot.png" width="30"/>}
            {message}
            {sender === 'user' && <img src="images/user.png" width="30"/>}
          </div>
        );
      }

      function ChatMessages() {
        const chatMessages = [{
          message: 'hello chatbot',
          sender: 'user',
          id: 'id1'
        }, {
          message: 'Hello! How can I help you?',
          sender: 'robot',
          id: 'id2'
        }, {
          message: "What is today's date",
          sender: 'user',
          id: 'id3'
        }, {
          message: "Today is May 21",
          sender: "robot" ,
          id: 'id4'
        }]; 

        return (
          <>
            {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage 
                  message = {chatMessage.message}
                  sender = {chatMessage.sender}
                  key={chatMessage.id}
                />
              ); 
          })} 
        </>
      );
    }

      //replace variable to component to create app(best practice)
      function App() {
        return (
          <>
          {/*ChatInput()*/}
          <ChatInput /> {/*this is component syntax, does the same as code above*/} 
          <ChatMessages />
          { /*
          <ChatMessage message="hello chatbot" sender="user"/>
          <ChatMessage message="Hello! How can I help you?" sender="robot"/>
          <ChatMessage message="What is today's date?" sender="user"/>
          <ChatMessage message="Today is May 21" sender="robot"/>
          */}
        </>
        );

      }
      // const app = (
      //   <>
      //     {/*ChatInput()*/}
      //     <ChatInput /> {/*this is component syntax, does the same as code above*/}
      //     <ChatMessage message="hello chatbot" sender="user"/>
      //     <ChatMessage message="Hello! How can I help you?" sender="robot"/>
      //     <ChatMessage message="What is today's date" sender="user"/>
      //     <ChatMessage message="Today is May 21" sender="robot"/>
      //   </>
      // );

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script> 
  </body>
</html>
